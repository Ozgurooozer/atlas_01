# Pre-commit Configuration
# AGENT_RULES.md koruması - her commit'te çalışır

repos:
  # 1. FORMAT KONTROL (30 saniye)
  - repo: https://github.com/psf/black
    rev: 24.1.0
    hooks:
      - id: black
        language_version: python3.12
        files: ^engine/

  # 2. LINT KONTROL (45 saniye)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^engine/

  # 3. TRAILING WHITESPACE
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']

  # 4. IMPORT KONTROL (15 saniye)
  - repo: local
    hooks:
      - id: check-imports
        name: Check Import Rules (AGENT_RULES.md 1.1, 1.3, 1.4)
        entry: python engine/scripts/check_imports.py
        language: system
        types: [python]
        pass_filenames: false

  # 5. HIZLI TEST (60 saniye)
  - repo: local
    hooks:
      - id: quick-tests
        name: Quick Tests (Core tests only)
        entry: python engine/scripts/run_quick_tests.py
        language: system
        types: [python]
        pass_filenames: false

# CI ortamında timeout
default_language_version:
  python: python3.12

# Hız için paralel çalıştır
default_stages: [pre-commit]
